<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Customers card-z </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .card-z  {
            position: relative;
            width: 340px;
            height: 108px;
            background: linear-gradient(180deg, #dbd9ff 12.729%, white 100%);
            border-radius: 10px;
            overflow: hidden;
        }

        .title {
            position: absolute;
            top: 27px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 15px;
            color: #4c4c4c;
            white-space: nowrap;
        }

        .number {
            position: absolute;
            top: 53px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 25px;
            color: black;
            white-space: nowrap;
        }

        .white-box {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            width: 73px;
            height: 73px;
            background-color: white;
            border-radius: 6px;
        }

        .circle-container {
            position: absolute;
            top: 9px;
            right: 12px;
            width: 32px;
            height: 32px;
        }

        .circle {
            width: 100%;
            height: 100%;
            background-color: white;
            border-radius: 50%;
            position: relative;
        }

        .arrow-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 13px;
            height: 13px;
        }

        .arrow-icon svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="card-z ">
        <p class="title">All Customers</p>
        <p class="number">20</p>
        <div class="white-box"></div>
        <div class="circle-container">
            <div class="circle">
                <div class="arrow-icon">
                    <svg fill="none" viewBox="0 0 10.5 10.5">
                        <path 
                            d="M0.75 9.75L9.75 0.75M9.75 0.75H2.38636M9.75 0.75V8.11364" 
                            stroke="black" 
                            stroke-width="1.5" 
                            stroke-linecap="round" 
                            stroke-linejoin="round"
                        />
                    </svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
